<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700&display=swap"
      rel="stylesheet"/>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="./assests/imgs/logo.png" alt="logo" class="logo">
        </div>
    </header>

    <h1>Entrar</h1>
    
    <div class="container"> 
        <form class="container-2">       
            <div class="forms-geral">
                <div class="form">
                    <label>Email*</label>
                    <input type="email" id="email" placeholder="exemplo@bbts.com.br">
                </div>
                        
                <div class="form">
                    <label>Senha*</label>
                    <input type="password" id="senha" placeholder="Digite sua senha">                   
                </div>
            </div>
            <div class="texto-cadastro">
            Ainda não possui uma conta? 
            <button type="button" id="botao-cadastro" class="botao-cadastro">Cadastre-se</button> 
            </div>        
            <button type="button" id="botao-acessar" class="botao-acessar">Acessar</button> 
        </form>
    
    
    <div>  
    <script src="./script.js"></script>
</body>
</html>
